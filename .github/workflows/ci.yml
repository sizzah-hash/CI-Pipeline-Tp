name: Pipeline simple

on:
  push:
    branches: main
  pull_request:
    branches: main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4
      - name: Installer python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Installer les dépendances
        run: pip install -r requirements.txt
      - name: installer flake8
        run: pip install flake8
      - name: lancer lint
        run: |
          flake8 app --count --select=E9,F63,F7,F82,F841 --show-source --statistics
          flake8 app --count --max-complexity=10 --max-line-length=127 --statistics
          flake8 tests --count --max-line-length=127 --statistics
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4
      - name: Installer python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Installer les dépendances
        run: pip install -r requirements.txt
      - name: lances les tests
        run: PYTHONPATH=$PYTHONPATH:. pytest tests/ -v --cov=app
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4
      - name: Installer python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Installer les dépendances
        run: |
          pip install -r requirements.txt
          pip install build
      - name: Build package
        run: python -m build
      - name: upload
        uses: actions/upload-artifact@v6
